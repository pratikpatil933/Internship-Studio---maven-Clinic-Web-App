spring.application.name=clinic-booking

# Database Configuration (Updated for MariaDB/MySQL 8 compatibility)
# Added serverTimezone to avoid connection errors
spring.datasource.url=jdbc:mysql://localhost:3306/clinicdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Hibernate 6+ automatically handles the dialect; using the generic one prevents ClassNotFound errors

# Thymeleaf
spring.thymeleaf.cache=false
